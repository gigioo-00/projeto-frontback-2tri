<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulários de Cadastro</title>
    <link rel="stylesheet" href="style.css"/>
  
  </head>
  <body>
    <h1>Formulários de Cadastro</h1>

    <section>
      <h2>Cadastro de Usuário</h2>
      <form>
        <label for="nome-usuario">Nome</label>
        <input type="text" id="nome-usuario" name="nome" placeholder="Digite seu nome" required />

        <label for="email-usuario">E-mail</label>
        <input type="email" id="email-usuario" name="email" placeholder="Digite seu e-mail" required />

        <label for="senha-usuario">Senha</label>
        <input type="password" id="senha-usuario" name="senha" placeholder="Digite sua senha" required />

        <button type="submit">Cadastrar Usuário</button>
      </form>
    </section>

    <section>
      <h2>Cadastro de Tarefa</h2>
      <form>
        <label for="titulo-tarefa">Título</label>
        <input type="text" id="titulo-tarefa" name="titulo" placeholder="Digite o título da tarefa" required />

        <label for="descricao-tarefa">Descrição</label>
        <textarea id="descricao-tarefa" name="descricao" rows="4" placeholder="Descreva a tarefa" required></textarea>

        <label for="prioridade-tarefa">Prioridade</label>
        <select id="prioridade-tarefa" name="prioridade" required>
          <option value="">Selecione a prioridade</option>
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>

        <button type="submit">Cadastrar Tarefa</button>
      </form>
    </section>

    <section>
      <h2>Reserva de Espaço da Escola</h2>
      <form>
        <label for="nome-reserva">Nome</label>
        <input type="text" id="nome-reserva" name="nome" placeholder="Digite seu nome" required />

        <label for="turma-reserva">Turma</label>
        <input type="text" id="turma-reserva" name="turma" placeholder="Digite sua turma" required />

        <label for="horario-reserva">Horário</label>
        <input type="time" id="horario-reserva" name="horario" required />

        <button type="submit">Reservar Espaço</button>
      </form>
    </section>

    <section>
      <h2>Login</h2>
      <form>
        <label for="email-login">E-mail</label>
        <input type="email" id="email-login" name="email" placeholder="Digite seu e-mail" required />

        <label for="senha-login">Senha</label>
        <input type="password" id="senha-login" name="senha" placeholder="Digite sua senha" required />

        <button type="submit">Entrar</button>
      </form>
    </section>

    <section>
      <h2>Contato para a Coordenação</h2>
      <form>
        <label for="assunto-contato">Assunto</label>
        <input type="text" id="assunto-contato" name="assunto" placeholder="Digite o assunto" required />

        <label for="mensagem-contato">Mensagem</label>
        <textarea id="mensagem-contato" name="mensagem" rows="5" placeholder="Escreva sua mensagem" required></textarea>

        <button type="submit">Enviar Mensagem</button>
      </form>
    </section>
  </body>
</html>
